<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Medicoz Hospital Gallery – View our modern medical facilities, operating rooms, and patient care areas. See what makes Medicoz the region's premier healthcare destination.">
  <title>Gallery – Medicoz Hospital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="top-bar"></div>
  <header id="global-header"></header>

  <section class="page-banner">
    <div class="container">
      <div class="page-banner-content">
        <h1>Gallery</h1>
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">Home</a>
          <span class="breadcrumb-sep"><i class="fas fa-angle-right"></i></span>
          <span class="breadcrumb-current">Gallery</span>
        </nav>
      </div>
    </div>
  </section>

  <!-- GALLERY -->
  <section class="gallery-section" aria-labelledby="galleryH">
    <div class="container">
      <div class="section-header animate-on-scroll">
        <span class="label">OUR GALLERY</span>
        <h2 id="galleryH">Photo <em>Gallery</em></h2>
        <div class="divider-icon"><i class="fas fa-heartbeat"></i></div>
        <p>Explore our world-class facilities, dedicated medical team, and patient care environments.</p>
      </div>

      <!-- Filters -->
      <div class="gallery-filters" role="tablist" aria-label="Gallery filter">
        <button class="filter-btn active" data-filter="all" role="tab">All</button>
        <button class="filter-btn" data-filter="cancer" role="tab">Cancer</button>
        <button class="filter-btn" data-filter="dental-care" role="tab">Dental Care</button>
        <button class="filter-btn" data-filter="cardiology" role="tab">Cardiology</button>
        <button class="filter-btn" data-filter="dental" role="tab">Dental</button>
        <button class="filter-btn" data-filter="eye-care" role="tab">Eye Care</button>
      </div>

      <!-- Gallery Grid -->
      <div class="gallery-grid" id="galleryGrid">
        <div class="gallery-item" data-category="cancer">
          <img src="https://images.unsplash.com/photo-1530026405186-ed1f139313f3?w=600&h=400&fit=crop&q=80" alt="Cancer treatment center">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="cardiology">
          <img src="https://images.unsplash.com/photo-1576086213369-97a306d36557?w=600&h=400&fit=crop&q=80" alt="Cardiology department equipment">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="dental-care">
          <img src="https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?w=600&h=400&fit=crop&q=80" alt="Dental care lab">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="dental">
          <img src="https://images.unsplash.com/photo-1559757175-5700dde675bc?w=600&h=400&fit=crop&q=80" alt="Dental procedure">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="eye-care">
          <img src="https://images.unsplash.com/photo-1551601651-2a8555f1a136?w=600&h=400&fit=crop&q=80" alt="Eye care specialist">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="cancer">
          <img src="https://images.unsplash.com/photo-1504813184591-01572f98c85f?w=600&h=400&fit=crop&q=80" alt="Oncology treatment">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="cardiology">
          <img src="https://images.unsplash.com/photo-1581595220892-b0739db3ba8c?w=600&h=400&fit=crop&q=80" alt="Heart monitoring equipment">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="dental-care">
          <img src="https://images.unsplash.com/photo-1612277795421-9bc7706a4a34?w=600&h=400&fit=crop&q=80" alt="Dental care tools">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="dental">
          <img src="https://images.unsplash.com/photo-1584982751601-97dcc096659c?w=600&h=400&fit=crop&q=80" alt="Dental equipment">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="eye-care">
          <img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=600&h=400&fit=crop&q=80" alt="Eye examination equipment">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="cancer">
          <img src="https://images.unsplash.com/photo-1559757148-5c350d0d3c56?w=600&h=400&fit=crop&q=80" alt="Cancer research">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
        <div class="gallery-item" data-category="cardiology">
          <img src="https://images.unsplash.com/photo-1631815589968-fdb09a223b1e?w=600&h=400&fit=crop&q=80" alt="Cardiology procedure">
          <div class="gallery-overlay"><i class="fas fa-search-plus"></i></div>
        </div>
      </div>

      <div class="load-more-wrap">
        <button class="btn btn-outline btn-lg" id="loadMoreBtn">Load More <i class="fas fa-plus" style="margin-left:8px"></i></button>
      </div>
    </div>
  </section>

  <!-- PARTNERS -->
  <section class="partners-section" aria-label="Partners">
    <div class="container">
      <div class="partners-grid">
        <div class="partner-logo"><div class="partner-logo-icon" style="background:#e0f7f7;color:#00897b;"><i class="fas fa-atom"></i></div><div class="partner-logo-text">ORTHATECH<small>INC</small></div></div>
        <div class="partner-logo"><div class="partner-logo-icon" style="background:#fff3e0;color:#ef6c00;"><i class="fas fa-heartbeat"></i></div><div class="partner-logo-text" style="color:#ef6c00;">Elisa<small>Medical Labs</small></div></div>
        <div class="partner-logo"><div class="partner-logo-icon" style="background:#e8f4fd;color:#1b75bc;"><i class="fas fa-plus-circle"></i></div><div class="partner-logo-text">Medical<small>Center</small></div></div>
        <div class="partner-logo"><div class="partner-logo-icon" style="background:#e8f4fd;color:#1b75bc;"><i class="fas fa-laptop-medical"></i></div><div class="partner-logo-text">Medical<small>Informatics</small></div></div>
        <div class="partner-logo"><div class="partner-logo-icon" style="background:#e0f7f7;color:#00897b;"><i class="fas fa-dna"></i></div><div class="partner-logo-text">Medical<small>Name</small></div></div>
      </div>
    </div>
  </section>

  <footer id="global-footer"></footer>
  <a href="#" class="back-to-top" id="backToTop" aria-label="Back to top"><i class="fas fa-chevron-up"></i></a>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/gallery.js"></script>
</body>
</html>
